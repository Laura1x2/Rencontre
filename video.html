<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lecteur Vidéo Plein Écran</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #000000; /* Fond noir complet pour l'immersion */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; /* Évite les barres de défilement du navigateur */
        }

        /* La vidéo prend toute la hauteur de l'écran et s'ajuste verticalement (9:16) */
        video {
            width: 100%;
            height: 100vh;
            max-width: 56.25vh; /* Force le ratio 9:16 exact sur grand écran pour éviter les déformations */
            object-fit: cover; /* Occupe tout l'espace disponible */
        }
    </style>
</head>
<body>

    <video controls loop>
        <source src="uploads/video.mp4" type="video/mp4">
        Votre navigateur ne prend pas en charge la lecture de cette vidéo.
    </video>

</body>
</html>
